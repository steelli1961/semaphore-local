# Semaphore Inventory File
# Define your hosts and groups here for network management

[all:vars]
# Common SSH settings
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/semaphore_key
ansible_port=22
ansible_connection=ssh
ansible_timeout=30

# Gathering facts
gather_subset=network,hardware,os

# Network settings for configuration
network_dns=8.8.8.8 8.8.4.4

# Web servers group
[webservers]
# Add your web servers here
# Example:
# web01.local    ansible_host=192.168.1.10
# web02.local    ansible_host=192.168.1.11

# Database servers group
[dbservers]
# Add your database servers here
# Example:
# db01.local     ansible_host=192.168.1.20
# db02.local     ansible_host=192.168.1.21

# Application servers group
[appservers]
# Add your application servers here
# Example:
# app01.local    ansible_host=192.168.1.30
# app02.local    ansible_host=192.168.1.31

# Monitoring servers group
[monitoring]
# Add your monitoring servers here
# Example:
# monitor01.local ansible_host=192.168.1.40

# Development/Test machines
[development]
# Add development machines here
# Example:
# dev01.local    ansible_host=192.168.1.50
# dev02.local    ansible_host=192.168.1.51

# Production servers - all production machines
[production:children]
webservers
dbservers
appservers
monitoring

# Linux-specific groups
[linux:children]
webservers
dbservers
appservers
monitoring
development

