---
# Monitoring Agent Installation
# Install and configure monitoring agents (Prometheus node_exporter, filebeat, etc.)

- name: Install monitoring agents
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    node_exporter_version: "1.6.1"
    node_exporter_user: node_exporter
    monitoring_port: 9100

  tasks:
    - name: Create monitoring user
      user:
        name: "{{ node_exporter_user }}"
        shell: /bin/false
        home: /var/lib/node_exporter
        createhome: no
        system: yes
      when: ansible_os_family != "Windows"

    - name: Download node_exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
      when: 
        - ansible_os_family in ["Debian", "RedHat"]
        - ansible_architecture == "x86_64"

    - name: Extract node_exporter
      unarchive:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
        dest: /tmp
        remote_src: yes
      when:
        - ansible_os_family in ["Debian", "RedHat"]
        - ansible_architecture == "x86_64"

    - name: Install node_exporter binary
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        owner: root
        group: root
        mode: '0755'
        remote_src: yes
      when:
        - ansible_os_family in ["Debian", "RedHat"]
        - ansible_architecture == "x86_64"

    - name: Create systemd service file
      template:
        src: /dev/stdin
        dest: /etc/systemd/system/node_exporter.service
        owner: root
        group: root
        mode: '0644'
      vars:
        service_file: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target
          
          [Service]
          Type=simple
          User={{ node_exporter_user }}
          ExecStart=/usr/local/bin/node_exporter --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/) --collector.netdev.device-exclude=^(veth.*)$
          Restart=always
          RestartSec=5
          
          [Install]
          WantedBy=multi-user.target
      when: ansible_os_family in ["Debian", "RedHat"]

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes
      when: ansible_os_family in ["Debian", "RedHat"]

    - name: Start and enable node_exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
      when: ansible_os_family in ["Debian", "RedHat"]

    - name: Verify node_exporter is running
      uri:
        url: "http://localhost:{{ monitoring_port }}/metrics"
        method: GET
      register: metrics_check
      retries: 3
      delay: 2
      when: ansible_os_family in ["Debian", "RedHat"]

    - name: Install basic monitoring tools
      package:
        name: 
          - sysstat
          - iotop
          - nethogs
        state: present
      when: ansible_os_family == "Debian"

    - name: Display monitoring status
      debug:
        msg: |
          ✓ Monitoring installed on {{ ansible_hostname }}
          Node Exporter: http://{{ ansible_default_ipv4.address }}:{{ monitoring_port }}/metrics
          Metrics available: {{ metrics_check.status | default('checking...') }}

  post_tasks:
    - name: Cleanup temporary files
      file:
        path: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
        state: absent
      changed_when: false
